services:
  server1:
    image: ubuntu:22.04
    container_name: Server1
    privileged: true
    tty: true
    stdin_open: true
    networks:
      storage_net:
        ipv4_address: 172.20.0.10
    volumes:
      - ./data/server1:/shared_data

  server2:
    image: ubuntu:22.04
    container_name: Server2
    privileged: true
    tty: true
    stdin_open: true
    networks:
      storage_net:
        ipv4_address: 172.20.0.11
    volumes:
      - ./data/server2:/shared_data

  server3:
    image: ubuntu:22.04
    container_name: Server3
    privileged: true
    tty: true
    stdin_open: true
    networks:
      storage_net:
        ipv4_address: 172.20.0.12
    volumes:
      - ./data/server3:/shared_data

networks:
  storage_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
